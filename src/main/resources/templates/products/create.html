<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Product')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <a th:href="@{/ui/products}" class="btn btn-outline btn-sm mb-3">&larr; Back to Products</a>
    <h1 class="mb-3">Create New Product</h1>

    <div class="card" style="max-width: 500px;">
        <form th:action="@{/ui/products/new}" method="post">
            <div class="form-group">
                <label for="name">Product Name</label>
                <input type="text" id="name" name="name" class="form-control" placeholder="Enter product name" required>
            </div>
            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" class="form-control" placeholder="0.00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" name="quantity" class="form-control" placeholder="0" min="0" required>
            </div>
            <div class="actions-row mt-2">
                <button type="submit" class="btn btn-primary">Create Product</button>
                <a th:href="@{/ui/products}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
