<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Product Detail')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-header">
        <div>
            <a th:href="@{/ui/products}" class="btn btn-outline btn-sm mb-2">&larr; Back to Products</a>
            <h1 th:text="${product.name()}">Product Name</h1>
        </div>
        <div>
            <span class="badge badge-success" th:if="${product.stockStatus() == 'IN_STOCK'}">In Stock</span>
            <span class="badge badge-warning" th:if="${product.stockStatus() == 'LOW_STOCK'}">Low Stock</span>
            <span class="badge badge-danger" th:if="${product.stockStatus() == 'OUT_OF_STOCK'}">Out of Stock</span>
        </div>
    </div>

    <div class="card mb-3">
        <div class="detail-grid">
            <div class="detail-item">
                <label>Price</label>
                <div class="value" th:text="'$' + ${#numbers.formatDecimal(product.price(), 1, 2)}">$0.00</div>
            </div>
            <div class="detail-item">
                <label>Quantity</label>
                <div class="value" th:text="${product.quantity()}">0</div>
            </div>
            <div class="detail-item">
                <label>Product ID</label>
                <div class="value text-muted" th:text="'#' + ${product.id()}">#1</div>
            </div>
            <div class="detail-item">
                <label>Stock Status</label>
                <div class="value" th:text="${product.stockStatus()}">IN_STOCK</div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="section-title">Quick Actions</div>
        <div class="actions-row">
            <form th:action="@{/ui/products/{id}/name(id=${product.id()})}" method="post" class="inline-form">
                <input type="text" name="name" class="form-control" placeholder="New name" required>
                <button type="submit" class="btn btn-outline btn-sm">Update Name</button>
            </form>

            <form th:action="@{/ui/products/{id}/price(id=${product.id()})}" method="post" class="inline-form">
                <input type="number" name="price" class="form-control" placeholder="New price" step="0.01" min="0.01" required>
                <button type="submit" class="btn btn-outline btn-sm">Update Price</button>
            </form>
        </div>

        <div class="actions-row mt-2">
            <form th:action="@{/ui/products/{id}/purchase(id=${product.id()})}" method="post" class="inline-form">
                <input type="number" name="amount" class="form-control" placeholder="Amount" min="1" required>
                <button type="submit" class="btn btn-success btn-sm">Purchase</button>
            </form>

            <form th:action="@{/ui/products/{id}/restock(id=${product.id()})}" method="post" class="inline-form">
                <input type="number" name="amount" class="form-control" placeholder="Amount" min="1" required>
                <button type="submit" class="btn btn-primary btn-sm">Restock</button>
            </form>

            <form th:action="@{/ui/products/{id}/delete(id=${product.id()})}" method="post"
                  onsubmit="return confirm('Are you sure you want to delete this product?')">
                <button type="submit" class="btn btn-danger btn-sm">Delete Product</button>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="section-title">Product History</div>

        <div th:if="${#lists.isEmpty(history)}" class="empty-state">
            <p>No history records yet</p>
        </div>

        <table th:if="${!#lists.isEmpty(history)}">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Product Name</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="h : ${history}">
                    <td th:text="${#temporals.format(h.timestamp(), 'yyyy-MM-dd HH:mm:ss')}">2026-01-01</td>
                    <td>
                        <span class="badge badge-success" th:if="${h.status().name() == 'ADDED'}">Added</span>
                        <span class="badge badge-info" th:if="${h.status().name() == 'PURCHASED'}">Purchased</span>
                        <span class="badge badge-info" th:if="${h.status().name() == 'UPDATED'}">Updated</span>
                        <span class="badge badge-success" th:if="${h.status().name() == 'RESTOCKED'}">Restocked</span>
                        <span class="badge badge-danger" th:if="${h.status().name() == 'DELETED'}">Deleted</span>
                    </td>
                    <td th:text="${h.productName()}">Product</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
