<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Products')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" th:text="${statistics.totalCount()}">0</div>
            <div class="stat-label">Total Products</div>
        </div>
        <div class="stat-card success">
            <div class="stat-value" th:text="'$' + ${#numbers.formatDecimal(statistics.inventoryValue(), 1, 2)}">$0</div>
            <div class="stat-label">Inventory Value</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-value" th:text="${statistics.lowStockCount()}">0</div>
            <div class="stat-label">Low Stock</div>
        </div>
        <div class="stat-card danger">
            <div class="stat-value" th:text="${statistics.outOfStockCount()}">0</div>
            <div class="stat-label">Out of Stock</div>
        </div>
    </div>

    <div class="page-header">
        <h1>Products</h1>
        <a th:href="@{/ui/products/new}" class="btn btn-primary">+ New Product</a>
    </div>

    <form th:action="@{/ui/products}" method="get" class="filter-bar">
        <div class="form-group">
            <label>Search by name</label>
            <input type="text" name="name" class="form-control" placeholder="Type to search..." th:value="${nameFilter}">
        </div>
        <div class="form-group">
            <label>Stock status</label>
            <select name="stockStatus" class="form-control">
                <option value="">All</option>
                <option value="IN_STOCK" th:selected="${stockStatusFilter == 'IN_STOCK'}">In Stock</option>
                <option value="LOW_STOCK" th:selected="${stockStatusFilter == 'LOW_STOCK'}">Low Stock</option>
                <option value="OUT_OF_STOCK" th:selected="${stockStatusFilter == 'OUT_OF_STOCK'}">Out of Stock</option>
            </select>
        </div>
        <button type="submit" class="btn btn-outline">Filter</button>
        <a th:href="@{/ui/products}" class="btn btn-outline">Clear</a>
    </form>

    <div class="card">
        <div th:if="${#lists.isEmpty(products)}" class="empty-state">
            <p>No products found</p>
            <a th:href="@{/ui/products/new}" class="btn btn-primary">Create your first product</a>
        </div>

        <table th:if="${!#lists.isEmpty(products)}">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td class="text-muted" th:text="${product.id()}">#</td>
                    <td>
                        <a th:href="@{/ui/products/{id}(id=${product.id()})}" class="product-name-link" th:text="${product.name()}">Product</a>
                    </td>
                    <td th:text="'$' + ${#numbers.formatDecimal(product.price(), 1, 2)}">$0.00</td>
                    <td th:text="${product.quantity()}">0</td>
                    <td>
                        <span class="badge badge-success" th:if="${product.stockStatus() == 'IN_STOCK'}">In Stock</span>
                        <span class="badge badge-warning" th:if="${product.stockStatus() == 'LOW_STOCK'}">Low Stock</span>
                        <span class="badge badge-danger" th:if="${product.stockStatus() == 'OUT_OF_STOCK'}">Out of Stock</span>
                    </td>
                    <td class="text-right">
                        <a th:href="@{/ui/products/{id}(id=${product.id()})}" class="btn btn-outline btn-sm">View</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
